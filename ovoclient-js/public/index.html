<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVO Client</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ LOGIN ═══ -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="logo-area">
        <div class="logo-circle">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="white" stroke-width="3"/>
            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
                  font-size="18" font-weight="800" fill="white" font-family="system-ui">OVO</text>
          </svg>
        </div>
        <h1>OVO Client</h1>
        <p class="subtitle">Web Interface</p>
      </div>

      <!-- Step 1: Phone -->
      <div id="step-phone" class="login-step active">
        <h2>Enter your phone number</h2>
        <p class="hint">We'll send a verification code via SMS</p>
        <div class="input-group">
          <label>Phone Number</label>
          <input id="inp-phone" type="tel" placeholder="081234567890" autocomplete="tel" />
        </div>
        <button id="btn-request-otp" class="btn-primary" onclick="requestOtp()">
          <span class="btn-text">Send OTP</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-otp" class="login-step">
        <h2>Enter OTP Code</h2>
        <p id="otp-hint" class="hint">Code sent to your number</p>
        <div class="input-group">
          <label>OTP Code</label>
          <input id="otp-single" type="text" placeholder="Enter OTP code" inputmode="numeric" autocomplete="one-time-code" />
        </div>
        <button id="btn-verify-otp" class="btn-primary" onclick="verifyOtp()">
          <span class="btn-text">Verify Code</span>
          <span class="btn-loader hidden"></span>
        </button>
        <button class="btn-ghost" onclick="goToStep('phone')">Change number</button>
      </div>

      <!-- Step 3: PIN -->
      <div id="step-pin" class="login-step">
        <h2>Enter your PIN</h2>
        <p class="hint">6-digit security PIN</p>
        <div class="pin-dots" id="pin-dots">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="numpad">
          <button class="numpad-key" onclick="pinInput('1')">1</button>
          <button class="numpad-key" onclick="pinInput('2')">2</button>
          <button class="numpad-key" onclick="pinInput('3')">3</button>
          <button class="numpad-key" onclick="pinInput('4')">4</button>
          <button class="numpad-key" onclick="pinInput('5')">5</button>
          <button class="numpad-key" onclick="pinInput('6')">6</button>
          <button class="numpad-key" onclick="pinInput('7')">7</button>
          <button class="numpad-key" onclick="pinInput('8')">8</button>
          <button class="numpad-key" onclick="pinInput('9')">9</button>
          <button class="numpad-key numpad-empty"></button>
          <button class="numpad-key" onclick="pinInput('0')">0</button>
          <button class="numpad-key numpad-back" onclick="pinBackspace()">⌫</button>
        </div>
        <div id="pin-login-status" class="status-msg hidden"></div>
        <button class="btn-ghost" onclick="goToStep('otp')">Back</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ DASHBOARD ═══ -->
  <div id="screen-dashboard" class="screen">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-logo">
        <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
          <circle cx="16" cy="16" r="15" stroke="white" stroke-width="2"/>
          <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
                font-size="11" font-weight="800" fill="white" font-family="system-ui">OVO</text>
        </svg>
        <span>OVO Client</span>
      </div>
      <button class="btn-icon" onclick="doLogout()" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <polyline points="16 17 21 12 16 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="dashboard-body">

      <!-- Balance cards -->
      <div class="balance-section">
        <div class="balance-card card-cash">
          <div class="card-label">OVO Cash</div>
          <div class="card-amount" id="cash-amount">—</div>
          <div class="card-account" id="cash-account"></div>
          <button class="card-refresh" onclick="loadBalance()" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M1 4v6h6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M23 20v-6h-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="balance-card card-points">
          <div class="card-label">OVO Points</div>
          <div class="card-amount" id="points-amount">—</div>
          <div class="card-sub">pts</div>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="actions-section">
        <h3>Quick Actions</h3>
        <div class="action-grid">
          <button class="action-btn" onclick="openModal('modal-transfer')">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <polyline points="19 12 12 19 5 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>Transfer</span>
          </button>
          <button class="action-btn" onclick="loadBalance()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                <line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
            <span>Balance</span>
          </button>
          <button class="action-btn" onclick="showSwitchAccount()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
            <span>Switch Account</span>
          </button>
        </div>
      </div>

      <!-- Status / log area -->
      <div class="log-section">
        <div class="log-header">
          <h3>Activity Log</h3>
          <button class="btn-ghost-sm" onclick="clearLog()">Clear</button>
        </div>
        <div id="activity-log" class="activity-log">
          <div class="log-empty">No activity yet</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ════════════════════════════════════════════════ TRANSFER MODAL ═══ -->
  <div id="modal-transfer" class="modal-overlay" onclick="closeModalOutside(event, 'modal-transfer')">
    <div class="modal">
      <div class="modal-header">
        <h3>Transfer OVO Cash</h3>
        <button class="modal-close" onclick="closeModal('modal-transfer')">✕</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Recipient Phone</label>
          <input id="tr-phone" type="tel" placeholder="081234567890" />
        </div>
        <div class="input-group">
          <label>Amount (min Rp 10.000)</label>
          <div class="amount-input-wrap">
            <span class="currency-prefix">Rp</span>
            <input id="tr-amount" type="number" placeholder="10000" min="10000" />
          </div>
        </div>
        <div class="input-group">
          <label>Message (optional)</label>
          <input id="tr-message" type="text" placeholder="Payment note" />
        </div>
        <div id="transfer-status" class="status-msg hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-transfer')">Cancel</button>
        <button id="btn-transfer" class="btn-primary" onclick="doTransfer()">
          <span class="btn-text">Send</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════ TOAST REGION ═══ -->
  <div id="toast-region" class="toast-region"></div>

  <script src="app.js"></script>
</body>
</html>
