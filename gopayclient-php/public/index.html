<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoPay Client (PHP)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ LOGIN ═══ -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="logo-area">
        <div class="logo-circle">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="white" stroke-width="3"/>
            <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle"
                  font-size="10" font-weight="800" fill="white" font-family="system-ui">GoPay</text>
          </svg>
        </div>
        <h1>GoPay Client</h1>
        <p class="subtitle">PHP Edition</p>
      </div>

      <!-- Step 1: Phone -->
      <div id="step-phone" class="login-step active">
        <h2>Enter your phone number</h2>
        <p class="hint">We'll send a verification code via WhatsApp or SMS</p>
        <div class="input-group">
          <label>Phone Number</label>
          <input id="inp-phone" type="tel" placeholder="+628123456789" autocomplete="tel" />
        </div>
        <button id="btn-request-otp" class="btn-primary" onclick="requestOtp()">
          <span class="btn-text">Send OTP</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-otp" class="login-step">
        <h2>Enter OTP Code</h2>
        <p id="otp-hint" class="hint">Code sent to your number</p>
        <div class="input-group">
          <label>OTP Code</label>
          <input id="otp-input" type="text" placeholder="Enter OTP code" inputmode="numeric" autocomplete="one-time-code" />
        </div>
        <div id="verify-status" class="status-msg hidden"></div>
        <button id="btn-verify-otp" class="btn-primary" onclick="verifyOtp()">
          <span class="btn-text">Verify &amp; Login</span>
          <span class="btn-loader hidden"></span>
        </button>
        <button class="btn-ghost" onclick="goToStep('phone')">Change number</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ DASHBOARD ═══ -->
  <div id="screen-dashboard" class="screen">

    <header class="topbar">
      <div class="topbar-logo">
        <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
          <circle cx="16" cy="16" r="15" stroke="white" stroke-width="2"/>
          <text x="50%" y="57%" dominant-baseline="middle" text-anchor="middle"
                font-size="7" font-weight="800" fill="white" font-family="system-ui">GoPay</text>
        </svg>
        <span>GoPay Client</span>
      </div>
      <button class="btn-icon" onclick="doLogout()" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <polyline points="16 17 21 12 16 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="dashboard-body">

      <!-- Balance cards -->
      <div class="balance-section">
        <div class="balance-card card-wallet">
          <div class="card-label">GoPay Wallet</div>
          <div class="card-amount" id="wallet-amount">—</div>
          <div class="card-sub" id="wallet-type"></div>
          <button class="card-refresh" onclick="loadBalance()" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M1 4v6h6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M23 20v-6h-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="balance-card card-coins">
          <div class="card-label">GoPay Coins</div>
          <div class="card-amount" id="coins-amount">—</div>
          <div class="card-sub">coins</div>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="actions-section">
        <h3>Quick Actions</h3>
        <div class="action-grid">
          <button class="action-btn" onclick="loadBalance()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                <line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
            <span>Balance</span>
          </button>
          <button class="action-btn" onclick="openModal('modal-transfer')">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <polyline points="19 12 12 19 5 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>Transfer</span>
          </button>
          <button class="action-btn" onclick="loadHistory()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <span>History</span>
          </button>
          <button class="action-btn" onclick="loadProfile()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
            <span>Profile</span>
          </button>
          <button class="action-btn" onclick="loadKyc()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>KYC</span>
          </button>
          <button class="action-btn" onclick="loadGoClub()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>GoClub</span>
          </button>
          <button class="action-btn" onclick="loadPayLater()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <span>PayLater</span>
          </button>
          <button class="action-btn" onclick="loadBankList()">
            <div class="action-icon">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <line x1="3" y1="22" x2="21" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="6" y1="18" x2="6" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="10" y1="18" x2="10" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="14" y1="18" x2="14" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="18" y1="18" x2="18" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <polygon points="12 2 20 7 4 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>Banks</span>
          </button>
        </div>
      </div>

      <!-- Collapsible data section -->
      <div id="data-section" class="data-section">
        <div class="section-header">
          <h3 id="data-section-title">Data</h3>
          <button class="btn-ghost-sm" onclick="hideDataSection()">Close</button>
        </div>
        <div class="section-body">
          <div id="data-section-content"></div>
        </div>
      </div>

      <!-- Activity log -->
      <div class="log-section">
        <div class="log-header">
          <h3>Activity Log</h3>
          <button class="btn-ghost-sm" onclick="clearLog()">Clear</button>
        </div>
        <div id="activity-log" class="activity-log">
          <div class="log-empty">No activity yet</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ════════════════════════════════════════════ TRANSFER MODAL ═══ -->
  <div id="modal-transfer" class="modal-overlay" onclick="closeModalOutside(event,'modal-transfer')">
    <div class="modal">
      <div class="modal-header">
        <h3>Transfer</h3>
        <button class="modal-close" onclick="closeModal('modal-transfer')">✕</button>
      </div>

      <!-- Tabs -->
      <div class="modal-tabs">
        <button id="tab-gopay" class="modal-tab active" onclick="switchTab('gopay')">GoPay P2P</button>
        <button id="tab-bank"  class="modal-tab"        onclick="switchTab('bank')">Bank</button>
      </div>

      <!-- GoPay P2P Tab -->
      <div id="panel-gopay" class="modal-tab-panel active">
        <div class="input-group">
          <label>Recipient Phone</label>
          <input id="tr-gopay-phone" type="tel" placeholder="+628123456789" />
        </div>
        <div class="input-group">
          <label>Amount (IDR)</label>
          <div class="amount-input-wrap">
            <span class="currency-prefix">Rp</span>
            <input id="tr-gopay-amount" type="number" placeholder="10000" min="1000" />
          </div>
        </div>
        <div class="input-group">
          <label>GoPay PIN</label>
          <input id="tr-gopay-pin" type="password" placeholder="6-digit PIN" inputmode="numeric" maxlength="6" />
        </div>
        <div id="transfer-gopay-status" class="status-msg hidden"></div>
      </div>

      <!-- Bank Tab -->
      <div id="panel-bank" class="modal-tab-panel">
        <div class="input-group">
          <label>Bank Code (e.g. bri, bca, mandiri)</label>
          <input id="tr-bank-code" type="text" placeholder="bca" />
        </div>
        <div class="input-group">
          <label>Account Number</label>
          <input id="tr-bank-number" type="text" placeholder="1234567890" inputmode="numeric" />
        </div>
        <div class="input-group">
          <label>Amount (IDR)</label>
          <div class="amount-input-wrap">
            <span class="currency-prefix">Rp</span>
            <input id="tr-bank-amount" type="number" placeholder="50000" min="10000" />
          </div>
        </div>
        <div class="input-group">
          <label>GoPay PIN</label>
          <input id="tr-bank-pin" type="password" placeholder="6-digit PIN" inputmode="numeric" maxlength="6" />
        </div>
        <div id="transfer-bank-status" class="status-msg hidden"></div>
      </div>

      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('modal-transfer')">Cancel</button>
        <button id="btn-transfer" class="btn-primary" onclick="doTransfer()">
          <span class="btn-text">Send</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast-region" class="toast-region"></div>
  <script src="app.js"></script>
</body>
</html>
